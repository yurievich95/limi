backend:
  name: git-gateway
local_backend: true

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "articoli"
    label: "📝 Articoli"
    folder: "_articoli"
    create: true
    slug: "{{numero}}-{{slug}}"
    fields:
      - { label: "Titolo", name: "title", widget: "string" }
      - { label: "Numero", name: "numero", widget: "string", hint: "Es: 5" }
      - { label: "Tema del numero", name: "tema", widget: "string", hint: "Es: Al Bar" }
      - { label: "Categoria", name: "categoria", widget: "select", options: ["Prosa", "Poesia", "Saggio", "Rubrica"] }
      - { label: "Rubrica", name: "rubrica", widget: "string", required: false }
      - { label: "Immagine di copertina", name: "immagine", widget: "image", required: false }
      - { label: "Estratto", name: "excerpt", widget: "text", required: false }
      - { label: "Autore", name: "autore", widget: "string", required: false, hint: "Nome e cognome dell'autore" }
      - { label: "Testo", name: "body", widget: "markdown" }
      - { label: "Layout", name: "layout", widget: "hidden", default: "articolo.njk" }

  - name: "galleria"
    label: "🖼 Galleria"
    folder: "_galleria"
    create: true
    slug: "{{numero}}-{{slug}}"
    fields:
      - { label: "Titolo opera", name: "title", widget: "string" }
      - { label: "Autore", name: "autore", widget: "string", required: false }
      - { label: "Numero", name: "numero", widget: "string", hint: "Es: 5" }
      - { label: "Tipo", name: "tipo", widget: "select", options: ["Illustrazione", "Fotografia", "Opera"] }
      - { label: "Immagine", name: "image", widget: "image" }
      - { label: "Didascalia", name: "didascalia", widget: "string", required: false }


  - name: "numeri"
    label: "📖 Numeri"
    folder: "_numeri"
    create: true
    fields:
      - { label: "Titolo", name: "title", widget: "string" }
      - { label: "Numero progressivo", name: "numero", widget: "number" }
      - { label: "Slug URL", name: "slug", widget: "string", hint: "Es: 06-titolo" }
      - { label: "Tema", name: "tema", widget: "string" }
      - { label: "Anno", name: "anno", widget: "string" }
      - { label: "Descrizione", name: "descrizione", widget: "text" }
      - { label: "Link PDF", name: "pdf", widget: "string", required: false }
      - { label: "Copertina", name: "copertina", widget: "image", required: false }

  - name: "rubriche"
    label: "📌 Rubriche"
    folder: "_rubriche"
    create: true
    fields:
      - { label: "Nome rubrica", name: "title", widget: "string" }
      - { label: "Descrizione", name: "descrizione", widget: "text" }
      - { label: "Autore", name: "autore", widget: "string", required: false }

  - name: "autori"
    label: "👤 Autori"
    folder: "_autori"
    create: true
    fields:
      - { label: "Nome completo", name: "title", widget: "string" }
      - { label: "Tipo", name: "tipo", widget: "select", options: ["Scrittore", "Illustratore", "Fotografo", "Poeta", "Redattore"] }
      - { label: "Numeri", name: "numeri", widget: "string", hint: "Es: 01, 03, 05" }
      - { label: "Bio", name: "bio", widget: "text", required: false }
      - { label: "Instagram", name: "instagram", widget: "string", required: false }
      - { label: "Layout", name: "layout", widget: "hidden", default: "base.njk" }

  - name: "impostazioni"
    label: "⚙️ Impostazioni"
    files:
      - name: "marquee"
        label: "Marquee — testo scorrente"
        file: "_data/marquee.json"
        fields:
          - label: "Voci del marquee"
            name: "voci"
            widget: "list"
            hint: "Ogni voce appare nella banda scorrente in homepage"
            field: 
                labe: "Voce" 
                name: "voce"
                widget: "string"
